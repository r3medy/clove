name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  bundle-check:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Report bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Entry | ESM | CJS | Types |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Core | $(wc -c < dist/index.js | xargs) bytes | $(wc -c < dist/index.cjs | xargs) bytes | $(wc -c < dist/index.d.ts | xargs) bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| React | $(wc -c < dist/react/index.js | xargs) bytes | $(wc -c < dist/react/index.cjs | xargs) bytes | $(wc -c < dist/react/index.d.ts | xargs) bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| Plugins | $(wc -c < dist/plugins/index.js | xargs) bytes | $(wc -c < dist/plugins/index.cjs | xargs) bytes | $(wc -c < dist/plugins/index.d.ts | xargs) bytes |" >> $GITHUB_STEP_SUMMARY
